<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="온누리 AS 교적">
<title>온누리 AS 교적</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ── 구글시트 API URL ── */
/* 아래 URL을 본인 것으로 교체하세요 */

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:17px;background:#f0f0f5;display:flex;align-items:center;justify-content:center}
.phone{width:100%;max-width:430px;height:100vh;max-height:932px;display:flex;flex-direction:column;background:#fff;position:relative;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,.15)}
@media(min-width:500px){.phone{border-radius:24px;height:90vh}}

/* ── 로딩 오버레이 ── */
.loading-overlay{position:absolute;inset:0;background:rgba(255,255,255,.92);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.loading-overlay.hidden{display:none}
.spinner{width:36px;height:36px;border:3px solid #EAE8FB;border-top-color:#534AB7;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:16px;color:#534AB7}
.toast{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:99px;font-size:15px;z-index:200;opacity:0;transition:opacity .3s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1}

/* 상태바 완전 삭제 */
.statusbar{display:none}
.topbar{padding:12px 18px 13px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:#fff}
.topbar h1{font-size:20px;font-weight:700;color:#1a1a2e}
.back-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#888;font-size:22px;background:none;border:none}
.screen{flex:1;overflow-y:auto;background:#fff;-webkit-overflow-scrolling:touch}

/* 바텀 네비 30% 크게 */
.bottomnav{display:flex;border-top:1px solid #f0f0f0;background:#fff;flex-shrink:0;padding:0}
.bnav-item{flex:1 1 0;min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 2px 12px;font-size:13px;color:#aaa;cursor:pointer;gap:3px;border:none;background:transparent}
.bnav-item i{font-size:24px;display:block}
.bnav-label{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.bnav-item.active{color:#534AB7}
.bnav-item.active .bnav-pill{background:#EAE8FB;border-radius:14px}
.bnav-pill{padding:4px 12px;border-radius:14px;transition:background .15s;display:flex;align-items:center;justify-content:center}

.page{display:none;padding:14px}
.page.active{display:block}
.stat2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.scard{background:#f8f8fc;border-radius:14px;padding:16px;cursor:pointer;transition:opacity .15s}
.scard:active{opacity:.7}
.scard-label{font-size:14px;color:#888;margin-bottom:4px}
.scard-val{font-size:32px;font-weight:700;color:#1a1a2e}
.scard-sub{font-size:13px;color:#aaa;margin-top:3px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;margin-top:18px}
.sec-title{font-size:17px;font-weight:600;color:#1a1a2e}
.badge{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:99px;font-size:14px;font-weight:500;white-space:nowrap}
.bg-green{background:#EAF3DE;color:#27500A}.bg-amber{background:#FAEEDA;color:#633806}.bg-red{background:#FCEBEB;color:#791F1F}.bg-gray{background:#F1EFE8;color:#444441}.bg-blue{background:#E6F1FB;color:#0C447C}.bg-teal{background:#E1F5EE;color:#085041}.bg-purple{background:#EEEDFE;color:#3C3489}.bg-pink{background:#FBEAF0;color:#72243E}.bg-orange{background:#FEF0E7;color:#7D3B0F}
.member-card{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid #f5f5f5;cursor:pointer}
.member-card:last-child{border-bottom:none}
.member-card:active{opacity:.7}
.av{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;flex-shrink:0;overflow:hidden}
.av img{width:100%;height:100%;object-fit:cover}
.av-p{background:#EEEDFE;color:#3C3489}.av-t{background:#E1F5EE;color:#085041}.av-c{background:#FAECE7;color:#712B13}.av-b{background:#E6F1FB;color:#0C447C}.av-g{background:#EAF3DE;color:#27500A}.av-pk{background:#FBEAF0;color:#72243E}.av-am{background:#FAEEDA;color:#633806}
.role-dot{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;font-size:9px;font-weight:700;flex-shrink:0}
.role-S{background:#D8D4F7;color:#534AB7}.role-M{background:#B8E8D8;color:#0F6E56}.role-T{background:#F5C9B8;color:#993C1D}
.member-info{flex:1;min-width:0}
.member-name-row{font-size:17px;font-weight:600;display:flex;align-items:center;gap:5px;flex-wrap:wrap;color:#1a1a2e}
.member-sub{font-size:14px;color:#888;margin-top:2px}
.chevron{color:#ccc;font-size:18px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border:1px solid #e8e8e8;border-radius:10px;font-size:15px;cursor:pointer;background:transparent;color:#333;white-space:nowrap;transition:all .15s}
.btn:active{opacity:.8}
.btn-primary{background:#534AB7;color:#fff;border-color:#534AB7}
.btn-danger{background:#FCEBEB;color:#791F1F;border-color:#F09595}
.btn-success{background:#EAF3DE;color:#27500A;border-color:#C0DD97}
.btn-full{width:100%;justify-content:center;padding:14px}

.pill{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:99px;border:1px solid #e8e8e8;font-size:14px;cursor:pointer;white-space:nowrap;background:#f8f8f8;color:#888;flex-shrink:0;transition:all .15s;font-weight:400}
.pill.on{background:#EAE8FB;color:#3C3489;border-color:#C5C0F0;font-weight:600}
.pill-count{font-size:12px;background:#fff;border-radius:99px;padding:1px 6px;color:#888;min-width:20px;text-align:center;line-height:1.4}
.pill.on .pill-count{background:#C5C0F0;color:#3C3489}
.filter-scroll{display:flex;gap:7px;overflow-x:auto;padding-bottom:6px;margin-bottom:8px}
.filter-scroll::-webkit-scrollbar{display:none}
.result-count{font-size:14px;color:#aaa;margin-bottom:8px}
.week-tab-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px}
.week-tab-row::-webkit-scrollbar{display:none}

.att-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #f5f5f5}
.att-row:last-child{border-bottom:none}
.att-name{flex:1;font-size:15px;display:flex;align-items:center;gap:7px;min-width:0}
.att-name span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.att-pair{display:flex;gap:6px;flex-shrink:0}
.att-btn{width:42px;height:36px;border-radius:8px;border:1px solid #e8e8e8;background:#f8f8f8;font-size:15px;cursor:pointer;font-weight:600;display:flex;align-items:center;justify-content:center;color:#aaa;transition:all .15s}
.att-btn.on{background:#D6EAF8;color:#1A5276;border-color:#AED6F1}
.att-btn.off{background:#FADBD8;color:#922B21;border-color:#F1948A}
/* 행사 참석 단일 토글 버튼 */
.att-btn-single{min-width:52px;height:36px;border-radius:8px;border:1px solid #e8e8e8;background:#f8f8f8;font-size:15px;cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center;color:#aaa;transition:all .15s;padding:0 8px}
.att-btn-single.on{background:#D6EAF8;color:#1A5276;border-color:#AED6F1}
.att-btn-single.off{background:#FADBD8;color:#922B21;border-color:#F1948A}

.s-input{width:100%;padding:11px 13px;border:1px solid #e8e8e8;border-radius:10px;font-size:16px;background:#fff;color:#333;outline:none}
.s-input:focus{border-color:#534AB7}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:14px;color:#888;margin-bottom:4px;font-weight:600}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:10px 12px;border:1px solid #e8e8e8;border-radius:10px;font-size:15px;background:#fff;color:#333;outline:none}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:#534AB7}
.form-row textarea{resize:vertical;min-height:52px}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.modal-bg{display:none;position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:30;align-items:flex-end;overflow:hidden}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:16px;width:100%;max-height:88%;display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,.12)}
.modal-scroll{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.modal-scroll::-webkit-scrollbar{display:none}
.modal-handle{width:36px;height:4px;background:#e0e0e0;border-radius:2px;margin:0 auto 14px;flex-shrink:0}
.modal-title{font-size:18px;font-weight:700;margin-bottom:14px;flex-shrink:0;color:#1a1a2e}
.modal-footer{display:flex;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid #f0f0f0;flex-shrink:0}
.modal-footer .btn{flex:1;justify-content:center}
.admin-section{background:#f8f8fc;border-radius:14px;padding:14px;margin-bottom:12px}
.admin-section-title{font-size:15px;font-weight:600;color:#888;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.group-chip{display:inline-flex;align-items:center;gap:5px;background:#fff;border:1px solid #e8e8e8;border-radius:99px;padding:5px 10px;font-size:14px;margin:3px;color:#333}
.group-chip-del{background:none;border:none;cursor:pointer;color:#ccc;font-size:15px;padding:0;line-height:1}
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:24px;gap:18px}
.login-icon{width:68px;height:68px;background:#EAE8FB;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:34px;color:#534AB7}
.login-title{font-size:22px;font-weight:700;color:#1a1a2e}
.login-sub{font-size:15px;color:#888;text-align:center}
.err-msg{font-size:14px;color:#A32D2D;display:none;text-align:center}
.ok-msg{font-size:14px;color:#27500A;display:none;text-align:center}
.event-card{border:1px solid #f0f0f0;border-radius:14px;padding:16px;margin-bottom:12px;background:#fff}
.subpage{display:none;padding:14px}
.subpage.active{display:block}
.empty-state{text-align:center;color:#ccc;font-size:15px;padding:48px 0;display:flex;flex-direction:column;align-items:center;gap:8px}
.empty-state i{font-size:40px}
.profile-header{display:flex;align-items:center;gap:14px;padding-bottom:14px;border-bottom:1px solid #f0f0f0;margin-bottom:14px;flex-shrink:0}
.profile-av{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;overflow:hidden;flex-shrink:0;border:1px solid #f0f0f0}
.profile-av img{width:100%;height:100%;object-fit:cover}
.profile-name-row{font-size:18px;font-weight:700;display:flex;align-items:center;gap:6px;margin-bottom:5px;color:#1a1a2e}
.photo-upload-btn{display:inline-flex;align-items:center;gap:4px;font-size:13px;color:#534AB7;cursor:pointer;background:none;border:none;margin-top:5px;padding:0}
.att-col-header{display:flex;justify-content:flex-end;gap:6px;padding:0 0 5px;border-bottom:1px solid #f0f0f0;margin-bottom:5px}
.att-col-lbl{width:42px;text-align:center;font-size:13px;font-weight:600;color:#aaa}
.role-select-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px}
.role-opt{display:flex;align-items:center;gap:5px;padding:8px 10px;border:1px solid #e8e8e8;border-radius:10px;cursor:pointer;flex:1;min-width:calc(50% - 3px);font-size:14px;background:#f8f8f8;color:#888;transition:all .15s}
.role-opt.selected{border-color:#C5C0F0;background:#EAE8FB;color:#3C3489;font-weight:600}
.role-opt .ri{width:18px;height:18px;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stat-tbl{width:100%;border-collapse:collapse;font-size:14px}
.stat-tbl th{font-size:12px;font-weight:600;color:#aaa;padding:8px 6px 5px;text-align:left;border-bottom:1px solid #f0f0f0}
.stat-tbl td{padding:9px 6px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
.stat-tbl tr:last-child td{border-bottom:none}
.bar-wrap{display:flex;align-items:center;gap:5px}
.bar-bg{flex:1;height:6px;background:#f0f0f0;border-radius:99px;overflow:hidden;min-width:24px}
.bar-fill{height:100%;border-radius:99px}
.bar-pct{font-size:12px;color:#aaa;white-space:nowrap}
.clickable-badge{cursor:pointer}.clickable-badge:active{opacity:.7}
.pw-toggle-btn{display:flex;align-items:center;gap:7px;font-size:15px;color:#888;cursor:pointer;padding:7px 0;background:none;border:none;width:100%;font-weight:500}
.pw-form{display:none;margin-top:10px;padding-top:10px;border-top:1px solid #f0f0f0}
.pw-form.open{display:block}
.admin-mem-tabs{display:flex;gap:7px;margin-bottom:12px}
.admin-mem-tab{flex:1;padding:9px 0;font-size:14px;font-weight:500;text-align:center;cursor:pointer;border-radius:99px;border:1px solid #e8e8e8;background:#f8f8f8;color:#888;transition:all .15s}
.admin-mem-tab.active{background:#EAE8FB;color:#3C3489;border-color:#C5C0F0;font-weight:600}
/* 동기화 상태 */
.sync-bar{background:#EAE8FB;color:#534AB7;font-size:14px;padding:7px 14px;text-align:center;flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:7px}
.sync-bar.error{background:#FCEBEB;color:#791F1F}
.sync-bar.hidden{display:none}
</style>
</head>
<body>
<div class="phone" id="app">

  <!-- 로딩 오버레이 -->
  <div class="loading-overlay" id="loading-overlay">
    <div style="width:56px;height:56px;background:#EAE8FB;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;color:#534AB7;margin-bottom:8px">
      <i class="ti ti-users"></i>
    </div>
    <div class="spinner"></div>
    <div class="loading-text" id="loading-text">데이터 불러오는 중...</div>
  </div>

  <!-- 토스트 -->
  <div class="toast" id="toast"></div>

  <!-- 동기화 상태 바 -->
  <div class="sync-bar hidden" id="sync-bar">
    <i class="ti ti-cloud-upload" style="font-size:13px"></i>
    <span id="sync-text">저장 중...</span>
  </div>

  <div class="statusbar" style="display:none"><span id="clock">9:41</span><span><i class="ti ti-wifi" style="font-size:13px"></i></span></div>
  <div class="topbar">
    <button class="back-btn" id="back-btn" style="visibility:hidden" onclick="goBack()"><i class="ti ti-arrow-left"></i></button>
    <h1 id="page-title">온누리 AS 교적</h1>
    <div style="width:36px"></div>
  </div>
  <div class="screen">

    <div id="pg-home" class="page active">
      <div class="stat2">
        <div class="scard" onclick="showSubpage('sub-all','전체 멤버')"><div class="scard-label">전체 멤버</div><div class="scard-val" id="total-count">-</div><div class="scard-sub">활동 · 새가족</div></div>
        <div class="scard" onclick="showSubpage('sub-week','이번 주 출석')"><div class="scard-label">이번 주 출석</div><div class="scard-val" id="home-att-count">-</div><div class="scard-sub" id="home-att-rate">출석률</div></div>
        <div class="scard" onclick="showSubpage('sub-perfect','이달 개근')"><div class="scard-label">이달 개근</div><div class="scard-val" id="home-perfect-count">-</div><div class="scard-sub">탭해서 보기</div></div>
        <div class="scard" onclick="showSubpage('sub-contact','연락 필요')"><div class="scard-label">연락 필요</div><div class="scard-val" style="color:#A32D2D" id="home-contact-count">-</div><div class="scard-sub">3주+ 결석</div></div>
      </div>
      <div class="sec-hdr"><div class="sec-title"><i class="ti ti-cake" style="color:#D4537E"></i> 이번 달 생일</div></div>
      <div id="birthday-chips" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px"></div>
      <div class="sec-hdr"><div class="sec-title"><i class="ti ti-plane" style="color:#185FA5"></i> 현재 부재 중</div></div>
      <div id="absent-chips" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px"></div>
      <div class="sec-hdr"><div class="sec-title"><i class="ti ti-chart-bar"></i> 순별 통계</div></div>
      <div style="border:1px solid #f0f0f0;border-radius:14px;overflow:hidden">
        <table class="stat-tbl"><thead><tr><th>순</th><th style="text-align:center">인원</th><th>예배</th><th>순모임</th><th style="text-align:center">개근</th></tr></thead>
        <tbody id="stats-tbody"></tbody></table>
      </div>
    </div>

    <div id="pg-attendance" class="page">
      <div class="week-tab-row" id="week-tabs" style="margin-bottom:10px"></div>
      <div class="filter-scroll" id="att-grp-pills"></div>
      <div style="margin-bottom:8px"><input class="s-input" type="text" id="att-search" placeholder="이름 검색..." oninput="renderAttendance()"></div>
      <div id="att-result-count" class="result-count"></div>
      <div class="att-col-header"><div class="att-col-lbl">예배</div><div class="att-col-lbl">순모임</div></div>
      <div id="att-list"></div>
      <button class="btn btn-primary btn-full" style="margin-top:10px" onclick="saveAttendance()"><i class="ti ti-device-floppy"></i> 출석 저장</button>
    </div>

    <div id="pg-members" class="page">
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <input class="s-input" type="text" id="mem-search" placeholder="이름 검색..." style="flex:1" oninput="renderMembers()">
        <button class="btn btn-success" style="padding:8px 10px" onclick="exportMembers()"><i class="ti ti-file-spreadsheet"></i></button>
      </div>
      <div class="filter-scroll" id="mem-filter-chips"></div>
      <div id="mem-result-count" class="result-count"></div>
      <div id="mem-list"></div>
    </div>

    <div id="pg-events" class="page">
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <button class="btn btn-primary" style="flex:1;justify-content:center" onclick="openM('modal-add-event')"><i class="ti ti-plus"></i> 행사 추가</button>
        <button class="btn btn-success" style="padding:8px 12px" onclick="exportEvents()"><i class="ti ti-file-spreadsheet"></i></button>
      </div>
      <div id="events-list"></div>
    </div>

    <div id="pg-admin" class="page">
      <div id="admin-login-view" class="login-screen">
        <div class="login-icon"><i class="ti ti-shield-lock"></i></div>
        <div class="login-title">관리자 로그인</div>
        <div class="login-sub">관리자 전용 페이지입니다</div>
        <input class="s-input" type="password" id="pw-input" placeholder="비밀번호" style="max-width:240px" onkeydown="if(event.key==='Enter')tryLogin()">
        <div class="err-msg" id="pw-err">비밀번호가 올바르지 않습니다</div>
        <button class="btn btn-primary" style="width:240px;justify-content:center;padding:12px" onclick="tryLogin()">로그인</button>
      </div>
      <div id="admin-main-view" style="display:none">
        <div class="admin-section">
          <div class="admin-section-title"><span><i class="ti ti-users-group"></i> 순 관리</span>
            <button class="btn" style="padding:4px 10px;font-size:11px" onclick="openM('modal-add-group')"><i class="ti ti-plus"></i> 추가</button>
          </div>
          <div id="group-chips"></div>
        </div>

<script>
// ═══════════════════════════════════════
//  ⚙️  설정 — 이 URL만 교체하면 됩니다
// ═══════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbwBV8Hdfi53nz91JO8eSiZYNVJzuxuYqvfETprQcZEvFNLcIz0P3nd5GGBpIpBy2wHe5A/exec';

// ═══════════════════════════════════════
//  상태 변수
// ═══════════════════════════════════════
const avCls=['av-p','av-t','av-c','av-b','av-g','av-pk','av-am'];
let adminPw='admin', isAdmin=false, editIdx=null;
let currentEventName='', eventGrpFilter='전체';
let activeFilters=new Set();
let adminMemTab='active';
let currentWeekIdx=0;
let attGrpFilter='전체';
let currentAttWeek=''; // 출석 저장용 날짜

const INACTIVE=new Set(['휴식','파송']);
const ACTIVE=new Set(['활동','새가족']);

let groups=['승민순','영환순','민지순','루터순','예찬순','채원순','새가족팀'];
let members=[];
let events=[];
let attendance={}; // { "날짜_이름": {worship:bool, small:bool} }

// ═══════════════════════════════════════
//  Google Sheets API
// ═══════════════════════════════════════
async function apiGet(sheet){
  try{
    const res=await fetch(`${API_URL}?action=read&sheet=${sheet}`);
    const json=await res.json();
    return json.data||[];
  }catch(e){console.error('apiGet error',e);return[];}
}

// POST with text/plain (simple request = no preflight = CORS 우회)
async function apiWrite(sheet,rows){
  try{
    const body=JSON.stringify({action:'write',sheet,rows});
    const res=await fetch(API_URL,{
      method:'POST',
      // text/plain은 preflight 없이 전송됨 → CORS 문제 없음
      headers:{'Content-Type':'text/plain;charset=UTF-8'},
      body
    });
    // Apps Script는 항상 200 반환하므로 성공으로 처리
    return true;
  }catch(e){
    console.error('apiWrite error',e);
    return false;
  }
}

async function apiPost(data){
  return apiWrite(data.sheet,data.rows);
}

function showSync(text){
  const bar=document.getElementById('sync-bar');
  const txt=document.getElementById('sync-text');
  bar.classList.remove('hidden','error');
  txt.textContent=text;
}
function hideSync(ok=true){
  const bar=document.getElementById('sync-bar');
  if(!ok){bar.classList.add('error');document.getElementById('sync-text').textContent='저장 실패 ⚠️';setTimeout(()=>bar.classList.add('hidden'),3000);return;}
  bar.classList.add('hidden');
}

async function loadFromSheets(){
  showLoading('데이터 불러오는 중...');

  // 각 시트를 독립적으로 불러옴 — 하나 실패해도 나머지는 계속
  const safeGet=async(sheet)=>{
    try{
      const res=await fetch(`${API_URL}?action=read&sheet=${sheet}`);
      const json=await res.json();
      return json.data||[];
    }catch(e){
      console.warn(`시트 불러오기 실패: ${sheet}`,e);
      return [];
    }
  };

  // members
  const mRows=await safeGet('members');
  if(mRows.length>1){
    members=mRows.slice(1).map(r=>({
      name:r[0]||'',group:r[1]||'',category:r[2]||'활동',role:r[3]||'',
      phone:r[4]||'',birth:r[5]||'',absType:r[6]||'',absEnd:r[7]||'',
      memo:r[8]||'',photo:r[9]||'',
      dots:[r[10]?+r[10]:0,r[11]?+r[11]:0,r[12]?+r[12]:0,r[13]?+r[13]:0],
      rate:r[14]?+r[14]:0
    }));
  }

  // groups
  const gSet=new Set(members.map(m=>m.group).filter(Boolean));
  groups=[...groups.filter(g=>gSet.has(g)),...[...gSet].filter(g=>!groups.includes(g))];

  // events
  const eRows=await safeGet('events');
  if(eRows.length>1){
    events=eRows.slice(1).map(r=>({name:r[0]||'',date:r[1]||'',place:r[2]||'',count:+r[3]||0}));
  }

  // attendance (일반 출석 + 행사 출석 모두 하나의 시트에서)
  const aRows=await safeGet('attendance');
  const newAtt={};
  if(aRows.length>1){
    aRows.slice(1).forEach(r=>{
      if(!r[0]||!r[1])return;
      const date=String(r[0]).trim();
      const name=String(r[1]).trim();
      if(!date||!name)return;
      // event_로 시작하면 행사 출석 key
      const key=date.startsWith('event_')?`${date}_${name}`:`${date}_${name}`;
      newAtt[key]={
        worship:r[2]==='TRUE'||r[2]===true||r[2]==='1',
        small:r[3]==='TRUE'||r[3]===true||r[3]==='1'
      };
    });
  }
  attendance=newAtt;

  hideLoading();
  showToast('✅ 데이터를 불러왔습니다');
  refreshAll();
}

async function saveMembers(){
  showSync('멤버 저장 중...');
  const header=['name','group','category','role','phone','birth','absType','absEnd','memo','photo','w1','w2','w3','w4','rate'];
  const rows=[header,...members.map(m=>[m.name,m.group,m.category,m.role,m.phone,m.birth,m.absType,m.absEnd,m.memo,m.photo,...(m.dots||[0,0,0,0]),m.rate||0])];
  const ok=await apiWrite('members',rows);
  hideSync(ok);
  return ok;
}

async function saveEvents(){
  showSync('행사 저장 중...');
  const rows=[['name','date','place','count'],...events.map(e=>[e.name,e.date,e.place,e.count])];
  const ok=await apiWrite('events',rows);
  hideSync(ok);
  return ok;
}

async function saveAttendanceToSheets(){
  showSync('출석 저장 중...');
  const rows=[['date','name','worship','small']];
  // 일반 출석 + 행사 출석 모두 attendance 시트에 저장
  Object.entries(attendance).forEach(([key,val])=>{
    if(key.startsWith('event_')){
      // 행사 출석: key = "event_행사명_이름"
      rows.push([key.split('_').slice(0,2).join('_'), key.split('_').slice(2).join('_'),
        val.worship?'TRUE':'FALSE', val.small?'TRUE':'FALSE']);
    } else {
      // 일반 출석: key = "YYYY-MM-DD_이름"
      const idx=key.indexOf('_');
      if(idx<0)return;
      const date=key.slice(0,idx);
      const name=key.slice(idx+1);
      if(!date||!name)return;
      rows.push([date,name,val.worship?'TRUE':'FALSE',val.small?'TRUE':'FALSE']);
    }
  });
  const ok=await apiWrite('attendance',rows);
  hideSync(ok);
  return ok;
}

async function saveEventAttendanceToSheets(){
  // 행사 출석도 동일한 attendance 시트에 저장
  return saveAttendanceToSheets();
}

// ═══════════════════════════════════════
//  UI 유틸
// ═══════════════════════════════════════
function showLoading(text){document.getElementById('loading-overlay').classList.remove('hidden');document.getElementById('loading-text').textContent=text;}
function hideLoading(){document.getElementById('loading-overlay').classList.add('hidden');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// 시계
function updateClock(){const d=new Date();document.getElementById('clock').textContent=`${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;}
setInterval(updateClock,30000);updateClock();

function fmtAU(inp){let v=inp.value.replace(/\D/g,'');if(v.length<=4)inp.value=v;else if(v.length<=7)inp.value=v.slice(0,4)+' '+v.slice(4);else inp.value=v.slice(0,4)+' '+v.slice(4,7)+' '+v.slice(7,10);}
function roleDot(role,sz){sz=sz||14;if(!role)return '';const cls=role==='S'?'role-S':role==='M'?'role-M':'role-T';return `<span class="role-dot ${cls}" style="width:${sz}px;height:${sz}px;font-size:${Math.round(sz*.58)}px">${role}</span>`;}
function inits(n){return n&&n.length>=2?n.slice(-2):n||'?'}
function avEl(m,i,sz){sz=sz||40;const cls=avCls[i%avCls.length];if(m.photo)return `<div class="av" style="width:${sz}px;height:${sz}px"><img src="${m.photo}" alt="${m.name}"></div>`;return `<div class="av ${cls}" style="width:${sz}px;height:${sz}px;font-size:${sz<=28?11:sz<=42?13:20}px">${inits(m.name)}</div>`;}
function statusBadge(m){
  if(m.category==='파송')return `<span class="badge bg-orange" style="font-size:10px"><i class="ti ti-send"></i> 파송</span>`;
  if(m.category==='휴식')return `<span class="badge bg-gray" style="font-size:10px"><i class="ti ti-moon"></i> 휴식</span>`;
  if(m.absType==='한국방문')return `<span class="badge bg-blue" style="font-size:10px"><i class="ti ti-home"></i> 한국방문</span>`;
  if(m.absType==='여행')return `<span class="badge bg-teal" style="font-size:10px"><i class="ti ti-plane"></i> 여행</span>`;
  if(m.category==='새가족')return `<span class="badge bg-pink" style="font-size:10px">새가족</span>`;
  return '';
}

// 출석 주차 목록 (최근 4주)
function getWeeks(){
  const weeks=[];
  const now=new Date();
  // 이번 주 일요일 찾기
  const day=now.getDay();
  const sunday=new Date(now);
  sunday.setDate(now.getDate()-day);
  for(let i=0;i<4;i++){
    const d=new Date(sunday);
    d.setDate(sunday.getDate()-i*7);
    const yy=d.getFullYear();
    const mm=String(d.getMonth()+1).padStart(2,'0');
    const dd=String(d.getDate()).padStart(2,'0');
    const label=i===0?`${d.getMonth()+1}/${d.getDate()} (이번 주)`:`${d.getMonth()+1}/${d.getDate()}`;
    weeks.push({label,date:`${yy}-${mm}-${dd}`});
  }
  return weeks;
}

async function saveAttendance(){
  // 1. 출석률 업데이트
  const weeks=getWeeks().map(w=>w.date);
  members.forEach(m=>{
    if(!ACTIVE.has(m.category))return;
    const dots=weeks.map(w=>{
      const a=attendance[`${w}_${m.name}`];
      return a&&(a.worship||a.small)?1:0;
    });
    m.dots=dots;
    m.rate=Math.round(dots.reduce((s,d)=>s+d,0)/dots.length*100);
  });
  // 2. UI 먼저 업데이트
  renderHome();buildFilterChips();renderMembers();
  // 3. 백그라운드 저장
  showSync('출석 저장 중...');
  try{
    await saveAttendanceToSheets();
    await saveMembers();
    showToast('✅ 출석이 저장되었습니다');
  }catch(e){
    console.error('save error',e);
    showToast('✅ 출석이 저장되었습니다'); // 로컬은 저장됨
  }
}

function countForFilter(key){
  if(key==='순장')return members.filter(m=>m.role==='S').length;
  if(key==='MC')return members.filter(m=>m.role==='M').length;
  if(key==='팀장')return members.filter(m=>m.role==='T').length;
  if(key==='새가족')return members.filter(m=>m.category==='새가족').length;
  if(key==='휴식')return members.filter(m=>m.category==='휴식').length;
  if(key==='파송')return members.filter(m=>m.category==='파송').length;
  if(key.startsWith('g:'))return members.filter(m=>m.group===key.slice(2)&&ACTIVE.has(m.category)).length;
  return 0;
}
function buildFilterChips(){
  const el=document.getElementById('mem-filter-chips');el.innerHTML='';
  const chips=[
    {key:'순장',label:'순장'},{key:'MC',label:'MC'},{key:'팀장',label:'팀장'},
    {key:'새가족',label:'새가족'},{key:'휴식',label:'휴식'},{key:'파송',label:'파송'},
    ...groups.map(g=>({key:'g:'+g,label:g})),
  ];
  chips.forEach(c=>{
    el.appendChild(pillBtn(c.label,countForFilter(c.key),activeFilters.has(c.key),()=>{
      if(activeFilters.has(c.key))activeFilters.delete(c.key);else activeFilters.add(c.key);
      buildFilterChips();renderMembers();
    }));
  });
}
function applyMemberFilters(list){
  if(!activeFilters.size)return list;
  return list.filter(m=>{
    for(const f of activeFilters){
      if(f==='순장'&&m.role==='S')return true;
      if(f==='MC'&&m.role==='M')return true;
      if(f==='팀장'&&m.role==='T')return true;
      if(f==='새가족'&&m.category==='새가족')return true;
      if(f==='휴식'&&m.category==='휴식')return true;
      if(f==='파송'&&m.category==='파송')return true;
      if(f.startsWith('g:')&&m.group===f.slice(2))return true;
    }return false;
  });
}

    // 상태: 없음=미정(-), worship=true→참석(O), worship=false&&존재→불참(X)
    let btnCls='',btnTxt='-';

function togEventAtt(btn){
  const key=btn.dataset.key;
  if(!attendance[key]){
    // 미정 → 참석
    attendance[key]={worship:true,small:true};
    btn.classList.add('on');btn.classList.remove('off');btn.textContent='O';
  } else if(attendance[key].worship===true){
    // 참석 → 불참
    attendance[key]={worship:false,small:false};
    btn.classList.remove('on');btn.classList.add('off');btn.textContent='X';
  } else {
    // 불참 → 미정
    delete attendance[key];
    btn.classList.remove('on','off');btn.textContent='-';
  }
}

function showAdminLogin(){document.querySelectorAll('.page,.subpage').forEach(p=>p.classList.remove('active'));document.getElementById('pg-admin').classList.add('active');document.getElementById('admin-login-view').style.display='flex';document.getElementById('admin-main-view').style.display='none';}
function tryLogin(){if(document.getElementById('pw-input').value===adminPw){isAdmin=true;document.getElementById('pw-err').style.display='none';document.getElementById('pw-input').value='';document.getElementById('admin-login-view').style.display='none';document.getElementById('admin-main-view').style.display='block';renderGroups();renderAdminMems();}else document.getElementById('pw-err').style.display='block';}
function adminLogout(){isAdmin=false;nav('home','온누리 AS 교적',0);}
function openM(id){document.getElementById(id).classList.add('open');if(id==='modal-add-member')populateGroupSelects();}
function closeM(id){document.getElementById(id).classList.remove('open')}
function openEdit(i){editIdx=i;const m=members[i];populateGroupSelects();const bigAv=document.getElementById('profile-av-large');if(m.photo){bigAv.innerHTML=`<img src="${m.photo}" alt="${m.name}" style="width:100%;height:100%;object-fit:cover">`;bigAv.className='profile-av';}else{bigAv.innerHTML=inits(m.name);bigAv.className=`profile-av ${avCls[i%avCls.length]}`;}document.getElementById('profile-name-display').textContent=m.name;document.getElementById('profile-role-icon').innerHTML=m.role?roleDot(m.role,16):'';document.getElementById('profile-badges-display').innerHTML=statusBadge(m)||(m.category==='활동'&&!m.absType?'<span class="badge bg-green" style="font-size:10px">활동</span>':'');document.getElementById('edit-name').value=m.name;document.getElementById('edit-group').value=m.group;document.getElementById('edit-cat').value=m.category;setSelectedRole('edit-role-row',m.role||'');document.getElementById('edit-phone').value=m.phone;document.getElementById('edit-birth').value=m.birth||'';document.getElementById('edit-abs-type').value=m.absType||'';document.getElementById('edit-abs-end').value=m.absEnd||'';document.getElementById('edit-memo').value=m.memo||'';document.getElementById('edit-abs-row').style.display=m.absType?'block':'none';const sc=document.querySelector('#modal-edit-member .modal-scroll');if(sc)sc.scrollTop=0;openM('modal-edit-member');}
function handlePhotoUpload(input){if(!input.files||!input.files[0])return;const reader=new FileReader();reader.onload=e=>{if(editIdx===null)return;members[editIdx].photo=e.target.result;const bigAv=document.getElementById('profile-av-large');bigAv.innerHTML=`<img src="${e.target.result}" alt="" style="width:100%;height:100%;object-fit:cover">`;bigAv.className='profile-av';};reader.readAsDataURL(input.files[0]);}
async function saveMember(){if(editIdx===null)return;const m=members[editIdx];m.name=document.getElementById('edit-name').value.trim()||m.name;m.group=document.getElementById('edit-group').value;m.category=document.getElementById('edit-cat').value;m.role=getSelectedRole('edit-role-row');m.phone=document.getElementById('edit-phone').value;m.birth=document.getElementById('edit-birth').value;m.absType=document.getElementById('edit-abs-type').value;m.absEnd=document.getElementById('edit-abs-end').value;m.memo=document.getElementById('edit-memo').value;closeM('modal-edit-member');await saveMembers();refreshAll();editIdx=null;showToast('✅ 멤버 정보가 저장되었습니다');}
async function deleteMember(){if(editIdx===null)return;if(confirm(`"${members[editIdx].name}"을(를) 삭제할까요?`)){members.splice(editIdx,1);editIdx=null;closeM('modal-edit-member');await saveMembers();refreshAll();showToast('🗑️ 멤버가 삭제되었습니다');}}
async function addMember(){const name=document.getElementById('inp-name').value.trim();const group=document.getElementById('inp-group').value;if(!name||!group)return;members.push({name,group,phone:document.getElementById('inp-phone').value,birth:document.getElementById('inp-birth').value,category:document.getElementById('inp-cat').value,role:getSelectedRole('inp-role-row'),absType:document.getElementById('inp-abs-type').value,absEnd:document.getElementById('inp-abs-end').value,dots:[0,0,0,0],rate:0,memo:document.getElementById('inp-memo').value,photo:''});closeM('modal-add-member');['inp-name','inp-phone','inp-birth','inp-memo'].forEach(id=>document.getElementById(id).value='');setSelectedRole('inp-role-row','');await saveMembers();refreshAll();showToast('✅ 멤버가 추가되었습니다');}
async function addGroup(){const leader=document.getElementById('inp-group-leader').value.trim();if(!leader)return;const name=leader.endsWith('팀')||leader.endsWith('순')?leader:leader+'순';if(!groups.includes(name))groups.push(name);document.getElementById('inp-group-leader').value='';closeM('modal-add-group');populateGroupSelects();renderGroups();buildFilterChips();renderAttGrpPills();renderHome();showToast('✅ 순이 추가되었습니다');}
async function deleteGroup(i){if(confirm(`"${groups[i]}" 순을 삭제할까요?`)){groups.splice(i,1);renderGroups();populateGroupSelects();buildFilterChips();renderAttGrpPills();renderHome();}}
function toggleEditAbsDates(){document.getElementById('edit-abs-row').style.display=document.getElementById('edit-abs-type').value?'block':'none';}
async function addEvent(){const name=document.getElementById('inp-event-name').value.trim();if(!name)return;events.push({name,date:document.getElementById('inp-event-date').value,place:document.getElementById('inp-event-place').value,count:0});['inp-event-name','inp-event-date','inp-event-place'].forEach(id=>document.getElementById(id).value='');closeM('modal-add-event');await saveEvents();renderEvents();showToast('✅ 행사가 추가되었습니다');}

function refreshAll(){renderHome();buildFilterChips();renderMembers();renderAttGrpPills();renderAttendance();renderEvents();if(isAdmin){renderGroups();renderAdminMems();}}

document.querySelectorAll('.modal-bg').forEach(m=>{m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open')});});

// ── 초기 로딩 ──
(async()=>{
  populateGroupSelects();
  renderWeekTabs();
  const weeks=getWeeks();
  currentAttWeek=weeks[0].date;
  await loadFromSheets();
})();
</script>
</body>
